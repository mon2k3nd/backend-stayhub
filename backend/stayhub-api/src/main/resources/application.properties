# ==========================================
# StayHub Backend Configuration
# ==========================================

server.port=8089

# ==========================================
# Database — PostgreSQL
# Thay YOUR_HOST, YOUR_DB, YOUR_USER, YOUR_PASS
# ==========================================
spring.datasource.url=jdbc:postgresql://YOUR_HOST:5432/stayhub_db
spring.datasource.username=YOUR_USER
spring.datasource.password=YOUR_PASS
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# JWT — BẮT BUỘC đổi secret trong production
# ==========================================
jwt.secret=stayhub_super_secret_key_change_in_production_2024
jwt.expiration=86400000

# ==========================================
# File Upload
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
upload.directory=uploads/

# ==========================================
# CORS — Cho phép Flutter app gọi API
# ==========================================
cors.allowed-origins=*

# ==========================================
# Logging
# ==========================================
logging.level.com.stayhub=INFO
logging.level.org.springframework.security=WARN
